name: Build and Release
# ProxyPin MCP Server ChuanKangKK Enhanced Edition - Automated Build & Release Pipeline

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        architecture: ${{ matrix.arch }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --onefile --name proxypin-mcp-server-windows-${{ matrix.arch }} proxypin_mcp_server.py

    - name: Create release info
      run: |
        echo "ProxyPin MCP Server ChuanKangKK Enhanced Edition" > dist/README.txt
        echo "Author: ChuanKangKK (GitHub: 1837620622)" >> dist/README.txt
        echo "WeChat: 1837620622" >> dist/README.txt
        echo "Email: 2040168455@qq.com" >> dist/README.txt
        echo "Platforms: Xianyu / Bilibili - Universal Programmer" >> dist/README.txt
        echo "" >> dist/README.txt
        echo "Usage:" >> dist/README.txt
        echo "1. Ensure the ProxyPin service is running on port 17777" >> dist/README.txt
        echo "2. Run: proxypin-mcp-server-windows-${{ matrix.arch }}.exe" >> dist/README.txt

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: proxypin-mcp-server-windows-${{ matrix.arch }}
        path: |
          dist/proxypin-mcp-server-windows-${{ matrix.arch }}.exe
          dist/README.txt

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            target_arch: arm64
          - arch: x64
            target_arch: x86_64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        # Simplified build process: use native architecture only to avoid cross-compilation issues
        pyinstaller --onefile --name proxypin-mcp-server-macos-${{ matrix.arch }} proxypin_mcp_server.py

    - name: Create release info
      run: |
        cat > dist/README.txt << 'EOF'
        ProxyPin MCP Server ChuanKangKK Enhanced Edition
        Author: ChuanKangKK (GitHub: 1837620622)
        WeChat: 1837620622
        Email: 2040168455@qq.com
        Platforms: Xianyu / Bilibili - Universal Programmer

        Usage:
        1. Ensure the ProxyPin service is running on port 17777
        2. Grant execute permission: chmod +x proxypin-mcp-server-macos-${{ matrix.arch }}
        3. Run: ./proxypin-mcp-server-macos-${{ matrix.arch }}

        Notes:
        - macOS may warn "unable to verify the developer"; allow it in System Preferences
        - If you encounter permission issues, run: sudo spctl --master-disable
        EOF

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: proxypin-mcp-server-macos-${{ matrix.arch }}
        path: |
          dist/proxypin-mcp-server-macos-${{ matrix.arch }}
          dist/README.txt

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create release archives
      run: |
        mkdir -p releases

        # Windows releases
        for arch in x64 x86; do
          cd "proxypin-mcp-server-windows-${arch}"
          zip -r "../releases/proxypin-mcp-server-windows-${arch}.zip" .
          cd ..
        done

        # macOS releases
        for arch in x64 arm64; do
          cd "proxypin-mcp-server-macos-${arch}"
          tar -czf "../releases/proxypin-mcp-server-macos-${arch}.tar.gz" .
          cd ..
        done

    - name: Generate release notes
      run: |
        cat > release_notes.md << 'EOF'
        # ProxyPin MCP Server ChuanKangKK Enhanced Edition

        ## New Features
        - High-performance HTTP request capture and analysis
        - Smart request filtering and search
        - Multi-language code generation support
        - HAR file import/export
        - Request comparison and diff
        - API endpoint smart extraction
        - Enhanced error handling and logging
        - Connection pooling
        - Thread-safe operations

        ## Developer Information
        - **Author**: ChuanKangKK (GitHub)
        - **WeChat**: 1837620622
        - **Email**: 2040168455@qq.com
        - **Platforms**: Xianyu / Bilibili - Universal Programmer
        - **GitHub**: https://github.com/1837620622

        ## Download Instructions

        ### Windows
        - `proxypin-mcp-server-windows-x64.zip` - 64-bit systems
        - `proxypin-mcp-server-windows-x86.zip` - 32-bit systems

        ### macOS
        - `proxypin-mcp-server-macos-x64.tar.gz` - Intel chips
        - `proxypin-mcp-server-macos-arm64.tar.gz` - Apple M-series chips

        ## Usage

        1. Ensure the ProxyPin service is running on port 17777
        2. Download the version for your platform
        3. Extract and run the executable

        ### Windows
        ```bash
        # Run the extracted executable directly
        proxypin-mcp-server-windows-x64.exe
        ```

        ### macOS
        ```bash
        # Extract
        tar -xzf proxypin-mcp-server-macos-arm64.tar.gz

        # Grant execute permission
        chmod +x proxypin-mcp-server-macos-arm64

        # Run
        ./proxypin-mcp-server-macos-arm64
        ```

        ## Notes

        - macOS may warn "unable to verify the developer"; allow it in System Preferences
        - Ensure the ProxyPin application is running and listening on port 17777
        - If you encounter issues, check the generated log file `proxypin_mcp.log`

        ## Bug Reports

        If you encounter any issues, please reach out via:
        - GitHub Issues: https://github.com/1837620622/proxypin-mcp-server/issues
        - WeChat: 1837620622
        - Email: 2040168455@qq.com
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: ProxyPin MCP Server ${{ github.ref_name }} - ChuanKangKK Enhanced
        body_path: release_notes.md
        files: |
          releases/*.zip
          releases/*.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-python-package:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build Python package
      run: |
        python -m build

    - name: Upload Python package artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: |
          dist/*.whl
          dist/*.tar.gz
